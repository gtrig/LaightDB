name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Vet
        run: go vet ./...

      # internal/stress has known data races in the harness; exclude from -race (see AGENTS.md / stress tests).
      - name: Test race
        run: go test -race $(go list ./... | grep -v 'github.com/gtrig/laightdb/internal/stress')

      - name: Lint
        run: go tool golangci-lint run

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install, build, and E2E
        working-directory: ui
        run: npm install && npm run build && npx playwright install chromium && npm run test:e2e
