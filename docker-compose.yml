services:
  laightdb:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - laightdb-data:/data
    environment:
      - LAIGHTDB_DATA_DIR=/data
      - LAIGHTDB_HTTP_ADDR=:8080
      - LAIGHTDB_MCP_TRANSPORT=http
    restart: unless-stopped

  laightdb-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - .:/src
      - go-cache:/go/pkg/mod
      - laightdb-dev-data:/data
    environment:
      - LAIGHTDB_DATA_DIR=/data
      - LAIGHTDB_HTTP_ADDR=:8080
      - LAIGHTDB_MCP_TRANSPORT=http
    profiles:
      - dev

  laightdb-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - laightdb
    restart: unless-stopped

  laightdb-ui-dev:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - laightdb-dev
    profiles:
      - dev

volumes:
  laightdb-data:
  laightdb-dev-data:
  go-cache:
